services:
  - type: web
    name: kisanmitra-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn kisanmitra_api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: kisanmitra-app
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run kisanmitra_app.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: API_URL
        sync: false
